<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Architecture Repository</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
text-align:center;
margin:0;
}

header{
background:#0d6efd;
color:white;
padding:20px;
}

.container{
margin-top:40px;
}

.login-box{
width:300px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
}

footer{
margin-top:40px;
background:#222;
color:white;
padding:10px;
}
</style>

</head>

<body>

<header>
<h1>Cloud Architecture Repository</h1>
<p>DevOps Git Workflow Experiment</p>
</header>

<div class="container">

<h2>Welcome</h2>
<p>This project demonstrates Git branching and pull request workflow.</p>

<div class="login-box">
<h3>Login Feature</h3>

<form>
<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<button type="submit">Login</button>
</form>

</div>

</div>

<footer>
<p>Feature Branch Update</p>
</footer>

</body>
</html>
